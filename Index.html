<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Weerwolven Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Times New Roman', Times, serif;
      padding: 10px;
      background: #111;
      color: white;
    }

    .role {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      background: #222;
      border-radius: 8px;
    }

    .role div {
      display: flex;
      gap: 10px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px;
      margin: 5px 0;
      font-size: 16px;
      width: 100%;
    }

    #startBtn {
      margin-top: 20px;
      padding: 10px;
      font-size: 18px;
      width: 100%;
    }

    #tableArea {
      position: relative;
      width: 95vw;
      height: 65vh;
      background: #1a1a1a;
      border-radius: 16px;
      margin: 10px auto;
      overflow: hidden;
    }

    #tableCircle {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border: none;
    }

    #tableCircle svg {
      position: absolute;
      top: 0;
      left: 0;
    }

    .playerCard {
      position: absolute;
      width: 90px;
      height: 55px;

      padding: 6px;
      background: #333;
      border-radius: 8px;

      display: flex;
      flex-direction: column;
      justify-content: center;

      font-size: 11px;
      text-align: center;
      cursor: grab;
      user-select: none;
      touch-action: none;
    }

    .playerCard strong {
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .playerCard span {
      font-size: 10px;
      opacity: 0.8;
    }

    h1 {
      font-size: 22px;
    }

    h2 {
      font-size: 18px;
    }
  </style>
</head>
<body>

  <div id="setupScreen">
    <h1>Weerwolven Setup</h1>
    <div id="roles"></div>
    <h2>Totaal spelers: <span id="total">0</span></h2>
    <button id="startBtn">Door naar namen invoeren</button>
    <button onclick="clearAll()">Clear alles</button>
  </div>

  <div id="nameScreen" style="display: none;"> 
    <h1>Voer namen in</h1>
    <div id="nameInputs"></div>
    <button id="continueBtn">Start spel</button>
    <button onclick="showScreen('setupScreen')">Terug</button>
  </div>

  <div id="roleScreen" style="display: none;">
    <h1>Rollen toewijzen</h1>
    <div id="playerRoles"></div>
    <button id="beginGameBtn">Begin spel</button>
    <button onclick="showScreen('setupScreen')">Terug</button>
  </div>

  <div id="tableScreen" style="display:none;">
    <h1>Plaats spelers</h1>
    <div id="tableArea">
      <div id="tableCircle" style="display:none;"></div>
    </div>

    <button onclick="handleBack()" class="uiBtn">Terug</button>

    <div style="display:flex; gap:10px;">
      <button onclick="zoomOut()" class="uiBtn">-</button>
      <button onclick="zoomIn()" class="uiBtn">+</button>
    </div>

    <button id="generateTableBtn" class="uiBtn">Genereer tafel</button>
    <button id="startGameBtn" style="display:none;" class="uiBtn">Start Game</button>
    </div>
  </div>

  <script>
    const roles = [
      { name: "Weerwolf", count: 0 , players: 1},
      { name: "Oerwolf", count: 0 , players: 1},
      { name: "Burger", count: 0 , players: 1},
      { name: "Cupido", count: 0 , players: 1},
      { name: "Slet", count: 0 , players: 1},
      { name: "Heks", count: 0 , players: 1},
      { name: "Ziener", count: 0 , players: 1},
      { name: "Tarzan", count: 0 , players: 1},
      { name: "Vos", count: 0 , players: 1},
      { name: "Boom", count: 0 , players: 1},
      { name: "Jager", count: 0 , players: 1},
      { name: "Engel", count: 0 , players: 1},
      { name: "Diddy", count: 0 , players: 1},
      { name: "Titus en de dansende beer", count: 0 , players: 1},
      { name: "Witte weerwolf", count: 0 , players: 1},
      { name: "Grote boze weerwolf", count: 0 , players: 1},
      { name: "Wolfshond", count: 0 , players: 1},
      { name: "Ridder met het roestige zwaard", count: 0 , players: 1},
      { name: "Tweelingen (2 spelers)", count: 0 , players: 2},
    ];

    let players = [];

    let currentScreen = "setupScreen";

    let scale = 1; // 1 = normaal, kleiner = meer ruimte

    let tableGenerated = false;

    const CARD_WIDTH = 90;
    const CARD_HEIGHT = 55;

    const rolesDiv = document.getElementById("roles");
    const totalSpan = document.getElementById("total");

    function render() {
      rolesDiv.innerHTML = "";

      let total = 0;

      roles.forEach((role, index) => {
        total += role.count * role.players;

        const div = document.createElement("div");
        div.className = "role";

        div.innerHTML = `
          <span>${role.name}</span>
          <div>
            <button onclick="change(${index}, -1)">-</button>
            <span>${role.count}</span>
            <button onclick="change(${index}, 1)">+</button>
          </div>
        `;

        rolesDiv.appendChild(div);
      });

      totalSpan.textContent = total;
    }

    function change(index, amount) {
      roles[index].count += amount;

      if (roles[index].count < 0) {
        roles[index].count = 0;
      }

      saveGame();
      render();
    }

    document.getElementById("startBtn").onclick = () => {
      const total = roles.reduce((sum, r) => sum + r.count * r.players, 0);

      if (total < 3) {
        alert("Minimaal 3 spelers nodig");
        return;
      }

      showScreen("nameScreen");

      renderNameInputs();
      saveGame();
    };

    render();

    function renderNameInputs() {
      const nameInputsDiv = document.getElementById("nameInputs");
      nameInputsDiv.innerHTML = "";

      const total = roles.reduce((sum, r) => sum + r.count * r.players, 0);

      // maak players als ze leeg zijn
      if (players.length === 0) {
        players = Array.from({ length: total }, () => ({
          name: "",
          role: null,
          alive: true
        }));
      }

      for (let i = 0; i < total; i++) {
        const input = document.createElement("input");
        input.value = players[i]?.name || "";
        input.placeholder = "Speler " + (i + 1);
        input.style.display = "block";
        input.style.margin = "5px 0";

        nameInputsDiv.appendChild(input);
      }
    }

    document.getElementById("continueBtn").onclick = () => {
      const inputs = document.querySelectorAll("#nameInputs input");

      players = [];
      let valid = true;

      inputs.forEach(input => {
        if (input.value.trim() === "") {
          valid = false;
        }

        players.push({
          name: input.value,
          role: null,
          alive: true
        });
      });

      if (!valid) {
        alert("Vul alle namen in!");
        return;
      }

      showScreen("roleScreen");

      renderRoleAssignment();
      saveGame();
    };

    function renderRoleAssignment() {
      const container = document.getElementById("playerRoles");
      container.innerHTML = "";

      players.forEach((player, index) => {
        const div = document.createElement("div");
        div.style.margin = "10px 0";

        // dropdown maken
        let options = "";

        const assigned = countAssignedRoles();

        roles.forEach(role => {
          const used = assigned[role.name] || 0;
          const max = role.count * role.players;

          if (used < max || player.role === role.name) {
            options += `<option value="${role.name}" 
              ${player.role === role.name ? "selected" : ""}>
              ${role.name}
            </option>`;
          }
        });

        div.innerHTML = `
          <span>${player.name}</span>
          <select onchange="setRole(${index}, this.value)">
            <option value="">-- kies rol --</option>
            ${options}
          </select>
        `;

        container.appendChild(div);
      });
    } 
  
    function setRole(index, roleName) {
      players[index].role = roleName;

      saveGame();
      renderRoleAssignment();
    }

    function countAssignedRoles() {
      const counts = {};

      players.forEach(player => {
        if (!player.role) return;

        if (!counts[player.role]) {
          counts[player.role] = 0;
        }

        counts[player.role]++;
      });

      return counts;
    }

    function validateRoles() {
      const assigned = countAssignedRoles();

      for (let role of roles) {
        const used = assigned[role.name] || 0;
        const required = role.count * role.players;

        if (used !== required) {
          return false;
        }
      }

      return true;
    }

    document.getElementById("beginGameBtn").onclick = () => {
      if (!validateRoles()) {
        alert("Niet alle rollen zijn correct verdeeld!");
        return;
      }

      showScreen("tableScreen");
      saveGame();
    };

    function renderTable() {
      const table = document.getElementById("tableArea");
      table.querySelectorAll(".playerCard").forEach(el => el.remove());

      players.forEach((player, index) => {
        const div = document.createElement("div");
        div.className = "playerCard";

        // Tweelingen fix (naam mooier maken)
        let roleName = player.role;
        if (roleName === "Tweelingen (2 spelers)") {
          roleName = "Tweelingen";
        }

        div.innerHTML = `
          <strong>${player.name}</strong><br>
          ${roleName}
        `;

        // start positie (random-ish)
        div.style.left = (player.x ?? (20 + (index % 4) * 100)) + "px";
        div.style.top = (player.y ?? (20 + Math.floor(index / 4) * 70)) + "px";

        makeDraggable(div, index);;

        table.appendChild(div);
      });
    }

   function makeDraggable(element, index) {
      let offsetX = 0;
      let offsetY = 0;

      element.addEventListener("pointerdown", (e) => {
        element.setPointerCapture(e.pointerId);

        const rect = element.getBoundingClientRect();

        // correcte offset (rekening houdend met scale)
        offsetX = (e.clientX - rect.left);
        offsetY = (e.clientY - rect.top);
      });

      element.addEventListener("pointermove", (e) => {
        if (!element.hasPointerCapture(e.pointerId)) return;

        const parentRect = element.parentElement.getBoundingClientRect();

        let x = e.clientX - parentRect.left - offsetX;
        let y = e.clientY - parentRect.top - offsetY;

        const gridSize = 10;

        x = Math.round(x / gridSize) * gridSize;
        y = Math.round(y / gridSize) * gridSize;

        const maxX = parentRect.width - element.offsetWidth;
        const maxY = parentRect.height - element.offsetHeight;

        x = Math.max(0, Math.min(x, maxX));
        y = Math.max(0, Math.min(y, maxY));

        element.style.left = x + "px";
        element.style.top = y + "px";
      });

      element.addEventListener("pointerup", (e) => {
        element.releasePointerCapture(e.pointerId);

        players[index].x = parseInt(element.style.left);
        players[index].y = parseInt(element.style.top);

        saveGame();
      });
    }

    function zoomIn() {
      scale += 0.1;
      if (scale > 1.5) scale = 1.5; // max zoom
      applyScale();
    }

    function zoomOut() {
      scale -= 0.1;
      if (scale < 0.5) scale = 0.5; // min zoom
      applyScale();
    }

    function applyScale() {
      document.querySelectorAll(".playerCard").forEach(card => {
        card.style.transform = `scale(${scale})`;
        card.style.transformOrigin = "top left";
      });

      saveGame();
    }

    document.getElementById("generateTableBtn").onclick = () => {
      renderTableShape();

      document.getElementById("tableCircle").style.display = "block";
      document.getElementById("startGameBtn").style.display = "block";

      tableGenerated = true;
    };

    function renderTableShape() {
      const circle = document.getElementById("tableCircle");
      if (!circle) return;

      const validPlayers = players.filter(p =>
        typeof p.x === "number" && typeof p.y === "number"
      );

      if (validPlayers.length < 3) return;

      // center berekenen
      let centerX = 0;
      let centerY = 0;

      validPlayers.forEach(p => {
        centerX += p.x + CARD_WIDTH / 2;
        centerY += p.y + CARD_HEIGHT / 2;
      });

      centerX /= validPlayers.length;
      centerY /= validPlayers.length;

      // sorteer rond midden
      validPlayers.forEach(p => {
        const px = p.x + CARD_WIDTH / 2;
        const py = p.y + CARD_HEIGHT / 2;

        p.angle = Math.atan2(py - centerY, px - centerX);
      });

      validPlayers.sort((a, b) => a.angle - b.angle);

      const shrink = 0.6;

      const points = validPlayers.map(p => {
        const px = p.x + CARD_WIDTH / 2;
        const py = p.y + CARD_HEIGHT / 2;

        return {
          x: centerX + (px - centerX) * shrink,
          y: centerY + (py - centerY) * shrink
        };
      });

      // SMOOTH PATH MAKEN (quadratic curves)
      let path = "";

      for (let i = 0; i < points.length; i++) {
        const current = points[i];
        const next = points[(i + 1) % points.length];

        const midX = (current.x + next.x) / 2;
        const midY = (current.y + next.y) / 2;

        if (i === 0) {
          path += `M ${midX} ${midY}`;
        }

        path += ` Q ${current.x} ${current.y} ${midX} ${midY}`;
      }

      path += " Z";

      // SVG injecten
      const rect = document.getElementById("tableArea").getBoundingClientRect();

      circle.innerHTML = `
        <svg width="100%" height="100%" viewBox="0 0 ${rect.width} ${rect.height}" preserveAspectRatio="none">
          <path d="${path}" fill="rgba(101,42,14,0.35)" />
        </svg>
      `;

      circle.style.display = "block";
    }

    document.getElementById("startGameBtn").onclick = () => {
      calculatePlayerOrder();

      // UI locken
      document.getElementById("generateTableBtn").style.display = "none";
      document.getElementById("startGameBtn").style.display = "none";

      // zoom + terug weg
      document.querySelectorAll(".uiBtn").forEach(btn => {
        if (btn.textContent === "Terug" || btn.textContent === "+" || btn.textContent === "-") {
          btn.style.display = "none";
        }
      });

      alert("Spel gestart!");
    };

    function calculatePlayerOrder() {
      let centerX = 0;
      let centerY = 0;

      players.forEach(p => {
        centerX += p.x;
        centerY += p.y;
      });

      centerX /= players.length;
      centerY /= players.length;

      players.forEach(p => {
        const dx = p.x - centerX;
        const dy = p.y - centerY;

        p.angle = Math.atan2(dy, dx); // -PI tot PI
      });

      // sorteer met de klok mee
      players.sort((a, b) => a.angle - b.angle);

      saveGame();
    }

    function handleBack() {
      if (tableGenerated) {
        // alleen tafel weghalen
        document.getElementById("tableCircle").style.display = "none";
        document.getElementById("startGameBtn").style.display = "none";

        tableGenerated = false;

      } else {
        // normale terug
        showScreen("setupScreen");
      }
    }

    function showScreen(screenId, shouldSave = true) {
      const screens = ["setupScreen", "nameScreen", "roleScreen", "tableScreen"];

      screens.forEach(id => {
        document.getElementById(id).style.display = "none";
      });

      document.getElementById(screenId).style.display = "block";

      currentScreen = screenId;

      if (shouldSave) {
        saveGame();
      }

      if (screenId === "nameScreen") renderNameInputs();
      if (screenId === "roleScreen") renderRoleAssignment();
      if (screenId === "tableScreen"){
        renderTable();  
        applyScale();
      }
    }

    function saveGame() {
      localStorage.setItem("werewolvesGame", JSON.stringify({
        roles: roles.map(r => ({
          name: r.name,
          count: r.count,
          players: r.players
        })),
        players,
        currentScreen,
        scale
      }));
    }

    function clearAll() {
      if (!confirm("Weet je zeker dat je alles wilt resetten?")) return;

      localStorage.removeItem("werewolvesGame");

      roles.forEach(r => {
        r.count = 0;
      });

      players = [];

      render();
      alert("Alles is gereset");
      location.reload();
    }

    window.onload = () => {
      const saved = localStorage.getItem("werewolvesGame");

      if (saved) {
        const data = JSON.parse(saved);

        // herstel roles
        if (data.roles) {
          data.roles.forEach(savedRole => {
            const role = roles.find(r => r.name === savedRole.name);
            if (role) {
              role.count = savedRole.count;
            }
          });
        }

          // herstel players
        players = data.players || [];

          // herstel scherm
        currentScreen = data.currentScreen || "setupScreen";

        // herstel schaal
        scale = data.scale || 1;
      }

      render();

      showScreen(currentScreen, false);
    };
  </script>

</body>
</html>
